<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>관리자 대시보드 | Wacky Blog</title>
  <meta name="robots" content="noindex,nofollow" />
  <link rel="icon" href="/favicon.ico" sizes="any" />
  <link rel="icon" type="image/png" sizes="32x32" href="/assets/images/favicon-32x32.png" />
  <link rel="icon" type="image/png" sizes="192x192" href="/assets/images/favicon-192x192.png" />
  <link rel="apple-touch-icon" sizes="180x180" href="/assets/images/apple-touch-icon.png" />
  <meta name="theme-color" content="#5B7CFF" />
  <link rel="stylesheet" href="/assets/css/app.css" />
  <link rel="stylesheet" href="/assets/css/components.css" />
</head>
<body>
  <header class="topbar topbar--editorial">
    <div class="topbar__inner topbar__inner--editorial">
      <button class="topbar-hamburger" type="button" aria-expanded="false" aria-controls="mobileSiteMenu" aria-label="메뉴 열기">
        <span></span><span></span><span></span>
      </button>

      <div class="topbar-left-slot"><div class="topbar-admin-status" data-admin-status hidden aria-live="polite">관리자 로그인 중</div></div>

      <a class="brand brand--center" href="/" aria-label="Wacky Blog 홈">
        <span class="brand__text">Wacky Wiki</span>
      </a>

      <nav class="nav nav--utility nav--right" aria-label="오른쪽 메뉴">
        <a href="/admin/dashboard.html" data-admin-link hidden>대시보드</a>
      </nav>
    </div>
  </header>

  <aside id="mobileSiteMenu" class="mobile-site-menu" hidden aria-hidden="true">
    <div class="mobile-site-menu__panel">
      <div class="mobile-site-menu__close-wrap">
        <button class="mobile-site-menu__close-toggle topbar-hamburger is-open" type="button" aria-label="메뉴 닫기" data-mobile-menu-close>
          <span></span><span></span><span></span>
        </button>
      </div>
      <nav class="mobile-site-menu__nav" aria-label="모바일 주요 메뉴">
        <a class="mobile-site-menu__text-link" href="/" data-path="/">홈</a>
      </nav>
      <div class="mobile-site-menu__section mobile-site-menu__section--categories">
        <div id="mobileSiteCategoryBar" class="topbar-categories__list topbar-categories__list--mobile"></div>
      </div>
      <div class="mobile-site-menu__section mobile-site-menu__section--admin" data-mobile-admin-section hidden>
        <a class="mobile-site-menu__text-link" href="/admin/dashboard.html" data-admin-link hidden>대시보드</a>
      </div>
    </div>
  </aside>

  <main class="container dashboard-shell">
    <section class="hero card dashboard-hero">
      <div class="hero-copy">
        <span class="badge">Admin Dashboard</span>
        <span class="badge" id="adminDashboardEmail">로그인 확인 중</span>
        <h1 class="hero-title">관리자용 글 운영 화면</h1>
        <p class="p hero-desc">발행 현황, 인기글, 최근 수정 글을 빠르게 확인하고 바로 관리 작업으로 이동할 수 있습니다.</p>
        <div class="row dashboard-actions" style="margin-top:12px;flex-wrap:wrap">
          <a class="btn btn--brand" href="/add.html">새 글 작성</a>
          <a class="btn" href="/">블로그 홈으로 가기</a>
          <a class="btn" href="/?status=draft">초안글 보기</a>
        </div>
      </div>
      <div class="dashboard-stats" aria-label="글 운영 현황">
        <div class="dashboard-stat">
          <div class="dashboard-stat__label">작성된 글</div>
          <strong class="dashboard-stat__value" id="dashboardTotalCount">-</strong>
        </div>
        <div class="dashboard-stat">
          <div class="dashboard-stat__label">발행 글</div>
          <strong class="dashboard-stat__value" id="dashboardPublishedCount">-</strong>
        </div>
        <div class="dashboard-stat">
          <div class="dashboard-stat__label">초안 글</div>
          <strong class="dashboard-stat__value" id="dashboardDraftCount">-</strong>
        </div>
      </div>
    </section>

    <section class="dashboard-grid" style="margin-top:16px">
      <article class="card dashboard-panel">
        <div class="dashboard-panel__head">
          <h2 class="h2">인기글 TOP 10</h2>
          <span class="small">제목 · 조회수 · 작성일 · 수정일</span>
        </div>
        <ol class="dashboard-popular" id="dashboardPopularList">
          <li class="small">불러오는 중…</li>
        </ol>
      </article>

      <aside class="dashboard-side">
        <article class="card dashboard-panel">
          <div class="dashboard-panel__head">
            <h2 class="h2">최근 수정 글</h2>
            <span class="small">최근 5개</span>
          </div>
          <ul class="dashboard-recent" id="dashboardRecentList">
            <li class="small">불러오는 중…</li>
          </ul>
        </article>

        <article class="card dashboard-panel">
          <div class="dashboard-panel__head">
            <h2 class="h2">카테고리 분포</h2>
            <span class="small">상위 8개</span>
          </div>
          <div class="dashboard-category-chips" id="dashboardCategoryChips">
            <span class="chip">불러오는 중…</span>
          </div>
        </article>
      </aside>
    </section>
  </main>

  <footer class="footer container"><div class="footer__inner"><div>© 2026 Wacky Blog</div></div></footer>
  <script src="/assets/js/admin-ui.js" defer></script>
  <script src="/assets/js/nav.js" defer></script>
  <script src="/assets/js/admin-dashboard.js" defer></script>
</body>
</html>
