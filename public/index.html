<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Wacky Blog | 실용적인 생활 블로그</title>
  <meta name="description" content="실용적인 생활 팁과 정리된 가이드를 빠르게 찾아볼 수 있는 블로그" />
  <link rel="stylesheet" href="/assets/css/app.css" />
  <link rel="stylesheet" href="/assets/css/components.css" />
</head>
<body>
  <header class="topbar topbar--index">
    <div class="topbar__inner">
      <div class="topbar__left">
        <button id="postsCategoriesToggle" class="topbar-menu-btn" type="button" aria-expanded="false" aria-controls="postsCategoriesMenu" aria-label="카테고리 메뉴 열기">
          <span></span><span></span><span></span>
        </button>
        <a class="brand" href="/"><span class="brand__mark">W</span><span>Wacky Blog</span></a>
      </div>
      <nav class="nav" aria-label="주요 메뉴">
        <a href="/" data-path="/">홈</a>
        <a href="/about/" data-path="/about">소개</a>
        <a href="/admin/dashboard.html" data-admin-link hidden>대시보드</a>
      </nav>
    </div>
    <div id="postsCategoriesMenu" class="topbar-categories" hidden>
      <div class="topbar-categories__inner container">
        <div class="topbar-categories__head">
          <strong>카테고리</strong>
          <button id="postsCategoriesClose" class="topbar-categories__close" type="button" aria-label="카테고리 메뉴 닫기">닫기</button>
        </div>
        <div id="postsCategoriesBar" class="topbar-categories__list"></div>
      </div>
    </div>
  </header>

  <main class="container posts-page">
    <section class="posts-home-hero" aria-labelledby="postsPageTitle">
      <div class="posts-home-hero__content">
        <p class="posts-home-hero__eyebrow">생활을 더 가볍게</p>
        <h1 id="postsPageTitle" class="posts-home-hero__title">바로 써먹기 좋은 생활 팁과 정리된 가이드</h1>
        <p id="postsPageDescription" class="posts-home-hero__desc">필요한 정보만 빠르게 찾고, 실제로 적용하기 쉬운 글만 모아볼 수 있습니다.</p>
      </div>
    </section>

    <div class="posts-layout posts-layout--clean" style="margin-top:20px">
      <section class="posts-main" aria-label="글 목록 영역">
        <div id="postsLoading" class="small">글 목록 불러오는 중…</div>
        <div id="postsError" class="small" hidden style="color:#b00020"></div>
        <div id="postsEmpty" class="small" hidden>등록된 글이 없습니다.</div>
        <div id="postsList" class="grid post-list-grid post-list-grid--rows" style="margin-top:12px"></div>

        <div id="postsLoadMoreWrap" class="posts-load-more" hidden>
          <button id="postsLoadMoreBtn" class="btn btn--brand posts-load-more__btn" type="button">더보기</button>
        </div>
      </section>

      <aside class="post-side posts-sidebar posts-sidebar--simple" aria-label="글 목록 사이드바">
        <div class="posts-sidebar__ad-shell" aria-label="향후 애드센스 광고 영역">
          <div class="post-side__ad-slot post-side__ad-slot--placeholder">
            <span>애드센스 광고가 들어갈 자리</span>
          </div>
        </div>

        <div class="posts-sidebar__popular-shell" aria-labelledby="posts-popular-title">
          <h2 id="posts-popular-title" class="h2">인기글</h2>
          <ul id="postsPopular" class="post-side__popular-list" style="margin-top:14px"></ul>
        </div>
      </aside>
    </div>
  </main>

  <footer class="footer container"><div class="footer__inner"><div>© 2026 Wacky Blog</div></div></footer>
  <script src="/assets/js/admin-ui.js" defer></script>
  <script src="/assets/js/nav.js" defer></script>
  <script src="/assets/js/posts.js" defer></script>
</body>
</html>
