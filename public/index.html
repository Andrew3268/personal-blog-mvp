<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Wacky Blog | 실용적인 생활 블로그</title>
  <meta name="description" content="실용적인 생활 팁과 정리된 가이드를 빠르게 찾아볼 수 있는 블로그" />
  <link rel="stylesheet" href="/assets/css/app.css" />
  <link rel="stylesheet" href="/assets/css/components.css" />
</head>
<body class="page-home">
  <header class="topbar topbar--editorial">
    <div class="topbar__inner topbar__inner--editorial">
      <button class="topbar-hamburger" type="button" aria-expanded="false" aria-controls="mobileSiteMenu" aria-label="메뉴 열기">
        <span></span><span></span><span></span>
      </button>

      <div class="topbar-left-slot" aria-hidden="true"></div>

      <a class="brand brand--center" href="/" aria-label="Wacky Blog 홈">
        <span class="brand__mark">W</span>
        <span class="brand__text">Wacky Wiki</span>
      </a>

      <nav class="nav nav--utility nav--right" aria-label="오른쪽 메뉴">
        <a href="/about/" data-path="/about">소개</a>
        <a href="/admin/dashboard.html" data-admin-link hidden>대시보드</a>
        <button class="nav__icon-btn nav__search-btn" type="button" data-search-open aria-label="검색 열기">
          <svg class="nav__icon-svg" viewBox="0 0 24 24" aria-hidden="true">
            <circle cx="11" cy="11" r="6.5"></circle>
            <path d="M16 16L21 21"></path>
          </svg>
        </button>
      </nav>

      <button class="topbar-mobile-search nav__icon-btn" type="button" data-search-open aria-label="검색 열기">
        <svg class="nav__icon-svg" viewBox="0 0 24 24" aria-hidden="true">
          <circle cx="11" cy="11" r="6.5"></circle>
          <path d="M16 16L21 21"></path>
        </svg>
      </button>
    </div>
  </header>

  <aside id="mobileSiteMenu" class="mobile-site-menu" hidden aria-hidden="true">
    <div class="mobile-site-menu__panel">
      <div class="mobile-site-menu__head">
        <strong>메뉴</strong>
      </div>
      <nav class="mobile-site-menu__nav" aria-label="모바일 주요 메뉴">
        <a class="mobile-site-menu__icon-link" href="/" data-path="/">
          <span class="nav__icon" aria-hidden="true">⌂</span>
          <span>홈</span>
        </a>
        <a class="mobile-site-menu__text-link" href="/about/" data-path="/about">소개</a>
        <a class="mobile-site-menu__text-link" href="/admin/dashboard.html" data-admin-link hidden>대시보드</a>
      </nav>
      <div class="mobile-site-menu__section">
        <div class="mobile-site-menu__title">카테고리</div>
        <div id="mobileSiteCategoryBar" class="topbar-categories__list topbar-categories__list--mobile"></div>
      </div>
    </div>
  </aside>

  <main class="container posts-page">
    <section id="postsHomeHero" class="posts-home-hero posts-home-hero--index" aria-labelledby="postsPageTitle">
      <div class="posts-home-hero__content posts-home-hero__content--editorial">
        <h1 id="postsPageTitle" class="posts-home-hero__title posts-home-hero__title--editorial">Wacky Wiki</h1>
        <p id="postsPageDescription" class="posts-home-hero__desc posts-home-hero__desc--editorial">정리된 생활 팁과 가이드를 빠르게 살펴보세요.</p>
        <div class="posts-home-hero__category-wrap" aria-label="카테고리 바로가기">
          <div id="heroCategoryBar" class="topbar-categories__list topbar-categories__list--hero"></div>
        </div>
      </div>
    </section>

    <div class="posts-layout posts-layout--clean posts-layout--home" style="margin-top:20px">
      <section class="posts-main" aria-label="글 목록 영역">
        <div id="postsLoading" class="small">글 목록 불러오는 중…</div>
        <div id="postsError" class="small" hidden style="color:#b00020"></div>
        <div id="postsEmpty" class="small" hidden>등록된 글이 없습니다.</div>
        <div id="postsList" class="grid post-list-grid post-list-grid--rows"></div>

        <div id="postsLoadMoreWrap" class="posts-load-more" hidden>
          <button id="postsLoadMoreBtn" class="btn btn--brand posts-load-more__btn" type="button">더보기</button>
        </div>
      </section>

      <aside class="post-side posts-sidebar posts-sidebar--simple" aria-label="글 목록 사이드바">
        <div class="posts-sidebar__ad-shell" aria-label="향후 애드센스 광고 영역">
          <div class="post-side__ad-slot post-side__ad-slot--placeholder">
            <span>애드센스 광고가 들어갈 자리</span>
          </div>
        </div>

        <div class="posts-sidebar__popular-shell" aria-labelledby="posts-popular-title">
          <h2 id="posts-popular-title" class="h2">인기글</h2>
          <ul id="postsPopular" class="post-side__popular-list" style="margin-top:14px"></ul>
        </div>
      </aside>
    </div>
  </main>

  <footer class="footer container"><div class="footer__inner"><div>© 2026 Wacky Blog</div></div></footer>
  <script src="/assets/js/admin-ui.js" defer></script>
  <script src="/assets/js/nav.js" defer></script>
  <script src="/assets/js/posts.js" defer></script>

  <div class="search-overlay" id="siteSearchOverlay" hidden aria-hidden="true">
    <div class="search-overlay__backdrop" data-search-close></div>
    <div class="search-overlay__panel" role="dialog" aria-modal="true" aria-labelledby="siteSearchTitle">
      <div class="search-overlay__head">
        <div>
          <div class="small">Search</div>
          <h2 class="h2" id="siteSearchTitle">검색</h2>
        </div>
        <button class="search-overlay__close" type="button" aria-label="검색 닫기" data-search-close>닫기</button>
      </div>
      <form class="search-overlay__form" id="siteSearchForm">
        <label class="search-overlay__field" for="siteSearchInput">
          <span class="search-overlay__icon" aria-hidden="true">⌕</span>
          <input class="search-overlay__input" id="siteSearchInput" name="q" type="search" placeholder="제목, 요약, 카테고리로 검색" autocomplete="off" />
        </label>
        <button class="btn btn--brand search-overlay__submit" type="submit">검색</button>
      </form>
      <div class="small">엔터를 누르거나 검색 버튼을 누르면 결과 페이지로 이동합니다.</div>
    </div>
  </div>

  <script src="/assets/js/search.js" defer></script>
</body>
</html>
