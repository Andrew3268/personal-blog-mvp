<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Wacky Blog | 실용적인 생활 블로그</title>
  <meta name="description" content="실용적인 생활 팁과 정리된 가이드를 빠르게 찾아볼 수 있는 블로그" />
  <link rel="stylesheet" href="/assets/css/app.css" />
  <link rel="stylesheet" href="/assets/css/components.css" />
</head>
<body class="page-home">
  <header class="topbar topbar--editorial">
    <div class="topbar__inner topbar__inner--editorial">
      <button class="topbar-hamburger" type="button" aria-expanded="false" aria-controls="mobileSiteMenu" aria-label="메뉴 열기">
        <span></span><span></span><span></span>
      </button>

      <div class="topbar-left-slot"><div class="topbar-admin-status" data-admin-status hidden aria-live="polite">관리자 로그인 중</div></div>

      <a class="brand brand--center" href="/" aria-label="Wacky Blog 홈">
        <span class="brand__text">Wacky Wiki</span>
      </a>

      <nav class="nav nav--utility nav--right" aria-label="오른쪽 메뉴">
        <a href="/admin/dashboard.html" data-admin-link hidden>대시보드</a>
      </nav>
    </div>
  </header>

  <aside id="mobileSiteMenu" class="mobile-site-menu" hidden aria-hidden="true">
    <div class="mobile-site-menu__panel">
      <div class="mobile-site-menu__close-wrap">
        <button class="mobile-site-menu__close-toggle topbar-hamburger is-open" type="button" aria-label="메뉴 닫기" data-mobile-menu-close>
          <span></span><span></span><span></span>
        </button>
      </div>
      <nav class="mobile-site-menu__nav" aria-label="모바일 주요 메뉴">
        <a class="mobile-site-menu__text-link" href="/" data-path="/">홈</a>
      </nav>
      <div class="mobile-site-menu__section mobile-site-menu__section--categories">
        <div id="mobileSiteCategoryBar" class="topbar-categories__list topbar-categories__list--mobile"></div>
      </div>
      <div class="mobile-site-menu__section mobile-site-menu__section--admin" data-mobile-admin-section hidden>
        <a class="mobile-site-menu__text-link" href="/admin/dashboard.html" data-admin-link hidden>대시보드</a>
      </div>
    </div>
  </aside>

  <main class="container posts-page">
    <section id="postsHomeHero" class="posts-home-hero posts-home-hero--index" aria-label="카테고리 바로가기">
      <div class="posts-home-hero__content posts-home-hero__content--editorial">
        <div class="posts-home-hero__category-wrap" aria-label="카테고리 바로가기">
          <div id="heroCategoryBar" class="topbar-categories__list topbar-categories__list--hero"><span class="topbar-categories__chip topbar-categories__chip--skeleton skeleton-box"></span><span class="topbar-categories__chip topbar-categories__chip--skeleton skeleton-box"></span><span class="topbar-categories__chip topbar-categories__chip--skeleton skeleton-box"></span><span class="topbar-categories__chip topbar-categories__chip--skeleton skeleton-box"></span></div>
        </div>
      </div>
    </section>

    <div class="posts-layout posts-layout--clean posts-layout--home posts-layout--home-top">
      <section class="posts-main" aria-label="글 목록 영역">
        <div id="postsLoading" class="small posts-loading-text" aria-hidden="true"></div>
        <div id="postsError" class="small posts-error" hidden></div>
        <div id="postsEmpty" class="small" hidden>등록된 글이 없습니다.</div>
        <div id="postsList" class="grid post-list-grid post-list-grid--rows">
          <article class="card post-card post-card--row post-card--skeleton" aria-hidden="true">
            <div class="post-card__thumb post-card__thumb--row skeleton-box skeleton-box--media"></div>
            <div class="post-card__body">
              <div class="post-meta post-meta--row">
                <div class="row row--chips">
                  <span class="skeleton-box skeleton-box--chip"></span>
                  <span class="skeleton-box skeleton-box--chip skeleton-box--chip-short"></span>
                </div>
                <span class="skeleton-box skeleton-box--date"></span>
              </div>
              <div class="skeleton-stack">
                <span class="skeleton-box skeleton-box--title"></span>
                <span class="skeleton-box skeleton-box--text"></span>
                <span class="skeleton-box skeleton-box--text skeleton-box--text-short"></span>
              </div>
              <div class="row post-admin-actions post-admin-actions--wrap">
                <span class="skeleton-box skeleton-box--button"></span>
                <span class="skeleton-box skeleton-box--button skeleton-box--button-muted"></span>
              </div>
            </div>
          </article>
          <article class="card post-card post-card--row post-card--skeleton" aria-hidden="true">
            <div class="post-card__thumb post-card__thumb--row skeleton-box skeleton-box--media"></div>
            <div class="post-card__body">
              <div class="post-meta post-meta--row">
                <div class="row row--chips">
                  <span class="skeleton-box skeleton-box--chip"></span>
                  <span class="skeleton-box skeleton-box--chip skeleton-box--chip-short"></span>
                </div>
                <span class="skeleton-box skeleton-box--date"></span>
              </div>
              <div class="skeleton-stack">
                <span class="skeleton-box skeleton-box--title"></span>
                <span class="skeleton-box skeleton-box--text"></span>
                <span class="skeleton-box skeleton-box--text skeleton-box--text-short"></span>
              </div>
              <div class="row post-admin-actions post-admin-actions--wrap">
                <span class="skeleton-box skeleton-box--button"></span>
                <span class="skeleton-box skeleton-box--button skeleton-box--button-muted"></span>
              </div>
            </div>
          </article>
          <article class="card post-card post-card--row post-card--skeleton" aria-hidden="true">
            <div class="post-card__thumb post-card__thumb--row skeleton-box skeleton-box--media"></div>
            <div class="post-card__body">
              <div class="post-meta post-meta--row">
                <div class="row row--chips">
                  <span class="skeleton-box skeleton-box--chip"></span>
                  <span class="skeleton-box skeleton-box--chip skeleton-box--chip-short"></span>
                </div>
                <span class="skeleton-box skeleton-box--date"></span>
              </div>
              <div class="skeleton-stack">
                <span class="skeleton-box skeleton-box--title"></span>
                <span class="skeleton-box skeleton-box--text"></span>
                <span class="skeleton-box skeleton-box--text skeleton-box--text-short"></span>
              </div>
              <div class="row post-admin-actions post-admin-actions--wrap">
                <span class="skeleton-box skeleton-box--button"></span>
                <span class="skeleton-box skeleton-box--button skeleton-box--button-muted"></span>
              </div>
            </div>
          </article>
        </div>

        <div id="postsLoadMoreWrap" class="posts-load-more" hidden>
          <button id="postsLoadMoreBtn" class="btn btn--brand posts-load-more__btn" type="button">더보기</button>
        </div>
      </section>

      <aside class="post-side posts-sidebar posts-sidebar--simple" aria-label="글 목록 사이드바">
        <div class="posts-sidebar__ad-shell" aria-label="향후 애드센스 광고 영역">
          <div class="post-side__ad-slot post-side__ad-slot--placeholder">
            <span>애드센스 광고가 들어갈 자리</span>
          </div>
        </div>

        <div class="posts-sidebar__popular-shell" aria-labelledby="posts-popular-title">
          <h2 id="posts-popular-title" class="h2">인기글</h2>
          <ul id="postsPopular" class="post-side__popular-list posts-popular-list"><li class="post-side__popular-link post-side__popular-link--skeleton" aria-hidden="true"><span class="post-side__popular-rank post-side__popular-rank--skeleton">1</span><span class="skeleton-box skeleton-box--popular"></span></li><li class="post-side__popular-link post-side__popular-link--skeleton" aria-hidden="true"><span class="post-side__popular-rank post-side__popular-rank--skeleton">2</span><span class="skeleton-box skeleton-box--popular"></span></li><li class="post-side__popular-link post-side__popular-link--skeleton" aria-hidden="true"><span class="post-side__popular-rank post-side__popular-rank--skeleton">3</span><span class="skeleton-box skeleton-box--popular"></span></li></ul>
        </div>
      </aside>
    </div>
  </main>

  <footer class="footer container"><div class="footer__inner"><div>© 2026 Wacky Blog</div></div></footer>
  <script src="/assets/js/admin-ui.js" defer></script>
  <script src="/assets/js/nav.js" defer></script>
  <script src="/assets/js/posts-hero-active.js" defer></script>
  <script src="/assets/js/posts.js" defer></script>
</body>
</html>
