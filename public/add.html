<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>글 작성 | Wacky Blog</title>
  <meta name="robots" content="noindex,nofollow" />
  <link rel="stylesheet" href="/assets/css/app.css" />
  <link rel="stylesheet" href="/assets/css/components.css" />
</head>
<body>
  <header class="topbar topbar--editorial">
    <div class="topbar__inner topbar__inner--editorial">
      <button class="topbar-hamburger" type="button" aria-expanded="false" aria-controls="mobileSiteMenu" aria-label="메뉴 열기">
        <span></span><span></span><span></span>
      </button>

      <div class="topbar-admin-status" data-admin-status hidden aria-live="polite">관리자 로그인 중</div>

      <a class="brand brand--center" href="/" aria-label="Wacky Blog 홈">
        <span class="brand__mark">W</span>
        <span class="brand__text">Wacky Wiki</span>
      </a>

      <nav class="nav nav--utility nav--right" aria-label="오른쪽 메뉴">
        <a href="/about/" data-path="/about">소개</a>
        <a href="/admin/dashboard.html" data-admin-link hidden>대시보드</a>
      </nav>

      <div class="topbar-mobile-spacer" aria-hidden="true"></div>
    </div>
  </header>

  <aside id="mobileSiteMenu" class="mobile-site-menu" hidden aria-hidden="true">
    <div class="mobile-site-menu__panel">
      <div class="mobile-site-menu__head">
        <strong>메뉴</strong>
        <button class="mobile-site-menu__close" type="button" aria-label="메뉴 닫기">닫기</button>
      </div>
      <nav class="mobile-site-menu__nav" aria-label="모바일 주요 메뉴">
        <a href="/" data-path="/">홈</a>
        <a href="/about/" data-path="/about">소개</a>
        <a href="/admin/dashboard.html" data-admin-link hidden>대시보드</a>
      </nav>
      <div class="mobile-site-menu__section">
        <div class="mobile-site-menu__title">카테고리</div>
        <div id="mobileSiteCategoryBar" class="topbar-categories__list topbar-categories__list--mobile"></div>
      </div>
    </div>
  </aside>
    </div>
  </main>

  <div class="preview-backdrop" id="previewBackdrop" hidden></div>
  <aside class="preview-drawer" id="previewDrawer" aria-hidden="true">
    <div class="preview-drawer__header">
      <div>
        <div class="small seo-eyebrow">본문 미리보기</div>
        <h2 class="h2">실시간 미리보기</h2>
      </div>
      <div class="preview-actions">
        <div class="preview-device-switch" role="tablist" aria-label="미리보기 기기 전환">
          <button class="btn btn--device is-active" type="button" data-preview-width="pc">PC</button>
          <button class="btn btn--device" type="button" data-preview-width="tablet">태블릿</button>
          <button class="btn btn--device" type="button" data-preview-width="mobile">모바일</button>
        </div>
        <button class="btn" id="previewCloseBtn" type="button">닫기</button>
      </div>
    </div>
    <div class="sep"></div>
    <div class="preview-stage" id="previewStage" data-device="pc">
      <div class="preview-frame preview-frame--pc" id="previewFrame">
        <div class="preview-page" id="previewContent"></div>
      </div>
    </div>
  </aside>

  <div class="modal-backdrop" id="categoryModalBackdrop" hidden></div>
  <aside class="modal-sheet modal-sheet--category" id="categoryModal" aria-hidden="true" role="dialog" aria-modal="true" aria-labelledby="categoryModalTitle">
    <div class="modal-sheet__header">
      <div>
        <div class="small seo-eyebrow">카테고리 관리</div>
        <h2 class="h2" id="categoryModalTitle">카테고리 설정</h2>
      </div>
      <button class="btn" id="closeCategoryModalBtn" type="button">닫기</button>
    </div>
    <div class="sep"></div>
    <div class="modal-sheet__body">
      <div class="category-manager__create">
        <div class="small">새 카테고리 추가</div>
        <div class="category-manager__create-row">
          <input class="input" id="newCategoryName" placeholder="예: 계절 팁" />
          <button class="btn btn--brand" id="addCategoryBtn" type="button">추가</button>
        </div>
      </div>
      <div class="sep"></div>
      <div class="category-manager__list" id="categoryManagerList"></div>
      <div class="small" id="categoryManagerStatus"></div>
    </div>
  </aside>

  <footer class="footer container">
    <div class="footer__inner">
      <div>© 2026 Wacky Blog</div>
    </div>
  </footer>

  <script src="/assets/js/admin-guard.js"></script>
  <script src="/assets/js/admin-ui.js" defer></script>
  <script src="/assets/js/nav.js" defer></script>
  <script src="/assets/js/add.js" defer></script>
</body>
</html>
