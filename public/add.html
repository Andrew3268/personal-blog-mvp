  <main class="container editor-shell">
    <section class="card editor-page-card">
      <div class="editor-page-head">
        <div>
          <div class="small seo-eyebrow">Editor</div>
          <h1 class="h1">새 글 작성</h1>
          <p class="p">새 글을 작성하고 SEO 상태를 함께 확인하세요.</p>
        </div>
        <div class="editor-page-actions">
          <button class="btn" id="previewOpenBtn" type="button" aria-expanded="false">미리보기</button>
          
          <button class="btn btn--brand" id="saveBtn" type="button">저장</button>
        </div>
      </div>

      <div id="saveStatus" class="small"></div>

      <div class="editor-layout">
        <div class="editor-main">
          <div class="grid editor-form-grid">

            <label>
              <div class="small">제목 <span id="titleCount"></span></div>
              <input class="input" id="title" placeholder="제목을 입력하세요" />
            </label>

            <label>
              <div class="small">슬러그 미리보기</div>
              <input class="input" id="slugPreview" readonly />
            </label>

            <label>
              <div class="small">메타 설명 <span id="metaDescriptionCount"></span></div>
              <textarea class="input" id="meta_description" rows="3" placeholder="검색 결과에 노출될 설명"></textarea>
            </label>

            <label>
              <div class="small">요약문 <span id="summaryCount"></span></div>
              <textarea class="input" id="summary" rows="4" placeholder="본문 상단 요약"></textarea>
            </label>

            <label class="editor-status-field">
              <div class="small">상태</div>
              <select class="input" id="status">
                <option value="published">발행</option>
                <option value="draft">초안</option>
              </select>
            </label>

            <div class="grid grid--2">
              <label>
                <div class="small">카테고리</div>
                <div style="display:flex; gap:8px; align-items:center;">
                  <select class="input" id="category"></select>
                  <button class="btn btn--icon-only" id="openCategoryModalBtn" type="button" aria-label="카테고리 관리">
                  <svg class="btn__icon-svg" viewBox="0 0 24 24" aria-hidden="true">
                    <path d="M12 5v14"></path>
                    <path d="M5 12h14"></path>
                  </svg>
                </button>
                </div>
              </label>
              <label>
                <div class="small">태그</div>
                <input class="input" id="tags" placeholder="예: 살림, 정리, 생활 팁" />
              </label>
            </div>

            <div class="grid editor-cover-fields">
              <label>
                <div class="small">대표 이미지 URL</div>
                <input class="input" id="cover_image" placeholder="https://..." />
              </label>
              <label>
                <div class="small">대표 이미지 ALT</div>
                <input class="input" id="cover_image_alt" placeholder="대표 이미지 설명" />
              </label>
            </div>

            <div class="card editor-option-card">
              <div style="display:flex; gap:18px; flex-wrap:wrap;">
                <label class="row"><input type="checkbox" id="enableToc" /> 목차 사용</label>
                <label class="row"><input type="checkbox" id="includeTocH3" /> H3 포함</label>
                <label class="row"><input type="checkbox" id="enable_sidebar_ad" checked /> 사이드바 광고</label>
                <label class="row"><input type="checkbox" id="enable_inarticle_ads" checked /> 본문 광고</label>
              </div>
              <div id="tocStatus" class="small" style="margin-top:10px;"></div>
            </div>

            <label>
              <div class="small">본문 Markdown <span id="contentCount"></span></div>
              <textarea class="input editor-textarea" id="content_md" rows="20" placeholder="본문을 입력하세요"></textarea>
            </label>

            <label>
              <div class="small">FAQ Markdown <span id="faqCount"></span></div>
              <textarea class="input" id="faq_md" rows="8" placeholder="Q: 질문&#10;A: 답변"></textarea>
            </label>

            <div class="card editor-option-card">
              <div class="h2" style="margin-bottom:12px;">본문 이미지</div>
              <div class="row" style="margin-bottom:10px;">
                <label class="row"><input type="checkbox" id="enableInlineImage1" /> 이미지 1 사용</label>
                <label class="row"><input type="checkbox" id="enableInlineImage2" /> 이미지 2 사용</label>
              </div>

              <div id="inlineImage1Fields" hidden class="grid" style="gap:12px; margin-bottom:16px;">
                <div class="small">이미지 1</div>
                <input class="input" id="inlineImage1Id" placeholder="이미지 URL" />
                <input class="input" id="inlineImage1Alt" placeholder="ALT 텍스트" />
                <input class="input" id="inlineImage1Caption" placeholder="캡션" />
                <select class="input" id="inlineImage1Position">
                  <option value="1">첫번째 H2 아래</option>
                  <option value="2">두번째 H2 아래</option>
                  <option value="3">세번째 H2 아래</option>
                  <option value="4">네번째 H2 아래</option>
                  <option value="5">다섯번째 H2 아래</option>
                </select>
              </div>

              <div id="inlineImage2Fields" hidden class="grid" style="gap:12px;">
                <div class="small">이미지 2</div>
                <input class="input" id="inlineImage2Id" placeholder="이미지 URL" />
                <input class="input" id="inlineImage2Alt" placeholder="ALT 텍스트" />
                <input class="input" id="inlineImage2Caption" placeholder="캡션" />
                <select class="input" id="inlineImage2Position">
                  <option value="1">첫번째 H2 아래</option>
                  <option value="2">두번째 H2 아래</option>
                  <option value="3">세번째 H2 아래</option>
                  <option value="4">네번째 H2 아래</option>
                  <option value="5">다섯번째 H2 아래</option>
                </select>
              </div>
            </div>

            <div class="card editor-option-card">
              <div style="display:flex; justify-content:space-between; gap:12px; align-items:center; flex-wrap:wrap;">
                <div class="h2">제휴 링크</div>
                <div class="row">
                  <label class="row"><input type="checkbox" id="enableAffiliateLinks" /> 사용</label>
                  <button class="btn" id="addAffiliateItemBtn" type="button">항목 추가</button>
                </div>
              </div>

              <div id="affiliateLinksFields" hidden class="grid" style="gap:12px; margin-top:12px;">

            <section class="card affiliate-item-card" id="affiliateItem1" style="padding:16px;">
              <div style="display:flex; justify-content:space-between; gap:10px; align-items:center; margin-bottom:10px;">

                <button class="btn" type="button" data-affiliate-remove="1">삭제</button>

                <input class="input" id="affiliateCurrentPrice1" placeholder="현재가" />
                <input class="input" id="affiliateSalePrice1" placeholder="할인가" />
                <input class="input" id="affiliateDiscountRate1" placeholder="할인율" />
                <select class="input" id="affiliatePosition1">

                <input class="input" id="affiliateLinkUrl2" placeholder="제휴 링크 URL" />
                <input class="input" id="affiliateProductName2" placeholder="상품명" />

                <input class="input" id="affiliateCurrentPrice2" placeholder="현재가" />
                <input class="input" id="affiliateSalePrice2" placeholder="할인가" />
                <input class="input" id="affiliateDiscountRate2" placeholder="할인율" />
                <select class="input" id="affiliatePosition2">

                  <option value="2">두번째 H2 아래</option>
                  <option value="3">세번째 H2 아래</option>
                  <option value="4">네번째 H2 아래</option>
                  <option value="5">다섯번째 H2 아래</option>
                </select>
              </div>
            </section>

            <section class="card affiliate-item-card" id="affiliateItem3" hidden style="padding:16px;">
              <div style="display:flex; justify-content:space-between; gap:10px; align-items:center; margin-bottom:10px;">
                <strong>제휴 상품 3</strong>
                <button class="btn" type="button" data-affiliate-remove="3">삭제</button>
              </div>
              <div class="grid grid--2">

                <input class="input" id="affiliateCurrentPrice3" placeholder="현재가" />
                <input class="input" id="affiliateSalePrice3" placeholder="할인가" />
                <input class="input" id="affiliateDiscountRate3" placeholder="할인율" />
                <select class="input" id="affiliatePosition3">
                  <option value="3">세번째 H2 아래</option>

                <select class="input" id="affiliatePosition4">
                  <option value="4">네번째 H2 아래</option>

                </select>
              </div>
            </section>

            <section class="card affiliate-item-card" id="affiliateItem5" hidden style="padding:16px;">
              <div style="display:flex; justify-content:space-between; gap:10px; align-items:center; margin-bottom:10px;">
                <strong>제휴 상품 5</strong>
                <button class="btn" type="button" data-affiliate-remove="5">삭제</button>
              </div>

        <aside class="editor-sidebar">
          <div class="card editor-keyword-card">
            <div class="small">SEO 키워드</div>
            <div class="grid editor-sidebar-fields" style="margin-top:12px;">
              <label>
                <div class="small">메인 키워드</div>
                <input class="input" id="focusKeyword" placeholder="메인 키워드" />
              </label>

            </div>
            <div class="sep"></div>
            <div id="seoChecklist" class="grid editor-seo-checklist"></div>

  <div class="search-overlay" id="siteSearchOverlay" hidden aria-hidden="true">
    <div class="search-overlay__backdrop" data-search-close></div>
    <div class="search-overlay__panel" role="dialog" aria-modal="true" aria-labelledby="siteSearchTitle">
      <div class="search-overlay__head">
        <div>
          <div class="small">Search</div>
          <h2 class="h2" id="siteSearchTitle">검색</h2>
        </div>
        <button class="search-overlay__close" type="button" aria-label="검색 닫기" data-search-close>닫기</button>
      </div>
      <form class="search-overlay__form" id="siteSearchForm">
        <label class="search-overlay__field" for="siteSearchInput">
          <span class="search-overlay__icon" aria-hidden="true">⌕</span>
          <input class="search-overlay__input" id="siteSearchInput" name="q" type="search" placeholder="제목, 요약, 카테고리로 검색" autocomplete="off" />
        </label>
