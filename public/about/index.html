<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>소개 | Wacky Blog</title>
  <meta name="description" content="개인 블로그 SSR MVP 소개 페이지" />
  <link rel="stylesheet" href="/assets/css/app.css" />
  <link rel="stylesheet" href="/assets/css/components.css" />
</head>
<body>
  <header class="topbar topbar--editorial">
    <div class="topbar__inner topbar__inner--editorial">
      <button class="topbar-hamburger" type="button" aria-expanded="false" aria-controls="mobileSiteMenu" aria-label="메뉴 열기">
        <span></span><span></span><span></span>
      </button>

      <div class="topbar-left-slot"><div class="topbar-admin-status" data-admin-status hidden aria-live="polite">관리자 로그인 중</div></div>

      <a class="brand brand--center" href="/" aria-label="Wacky Blog 홈">
        <span class="brand__text">Wacky Wiki</span>
      </a>

      <nav class="nav nav--utility nav--right" aria-label="오른쪽 메뉴">
        <a href="/admin/dashboard.html" data-admin-link hidden>대시보드</a>
        <button class="nav__icon-btn nav__search-btn" type="button" data-search-open aria-label="검색 열기">
          <svg class="nav__icon-svg" viewBox="0 0 24 24" aria-hidden="true">
            <circle cx="11" cy="11" r="6.5"></circle>
            <path d="M16 16L21 21"></path>
          </svg>
        </button>
      </nav>

      <button class="topbar-mobile-search nav__icon-btn" type="button" data-search-open aria-label="검색 열기">
        <svg class="nav__icon-svg" viewBox="0 0 24 24" aria-hidden="true">
          <circle cx="11" cy="11" r="6.5"></circle>
          <path d="M16 16L21 21"></path>
        </svg>
      </button>
    </div>
  </header>

  <aside id="mobileSiteMenu" class="mobile-site-menu" hidden aria-hidden="true">
    <div class="mobile-site-menu__panel">
      <div class="mobile-site-menu__close-wrap">
        <button class="mobile-site-menu__close-toggle topbar-hamburger is-open" type="button" aria-label="메뉴 닫기" data-mobile-menu-close>
          <span></span><span></span><span></span>
        </button>
      </div>
      <nav class="mobile-site-menu__nav" aria-label="모바일 주요 메뉴">
        <a class="mobile-site-menu__text-link" href="/" data-path="/">홈</a>
      </nav>
      <div class="mobile-site-menu__section mobile-site-menu__section--categories">
        <div id="mobileSiteCategoryBar" class="topbar-categories__list topbar-categories__list--mobile"></div>
      </div>
      <div class="mobile-site-menu__section mobile-site-menu__section--admin" data-mobile-admin-section hidden>
        <a class="mobile-site-menu__text-link" href="/admin/dashboard.html" data-admin-link hidden>대시보드</a>
      </div>
    </div>
  </aside>

  <main class="container">

    <section class="postsHomeHero about-postsHomeHero" aria-label="페이지 메뉴">
      <div class="posts-home-hero__category-wrap">
        <nav class="posts-home-hero__category-nav">
          <a class="posts-home-hero__category-link" href="/">전체</a>
</nav>
      </div>
    </section>

    <section class="card" style="display:flex;flex-direction:column;gap:12px">
      <h1 class="h1">이 MVP가 하는 일</h1>
      <p class="p">이 프로젝트는 개인 블로그 운영자가 직접 글을 저장하고, 그 글이 실제 페이지로 SSR 렌더링되는 최소 구조를 제공합니다.</p>
      <div class="sep"></div>
      <ul class="plain-list">
        <li>글 작성 / 수정 관리자 화면</li>
        <li>D1 저장</li>
        <li>개별 글 SSR</li>
        <li>Cloudflare 엣지 캐시</li>
        <li>사이트맵 자동 생성</li>
      </ul>
    </section>
  </main>

  <footer class="footer container"><div class="footer__inner"><div>© 2026 Wacky Blog</div></div></footer>
  <script src="/assets/js/admin-ui.js" defer></script>
  <script src="/assets/js/nav.js" defer></script>

  <div class="search-overlay" id="siteSearchOverlay" hidden aria-hidden="true">
    <div class="search-overlay__backdrop" data-search-close></div>
    <div class="search-overlay__panel" role="dialog" aria-modal="true" aria-labelledby="siteSearchTitle">
      <div class="search-overlay__head">
        <h2 class="h2" id="siteSearchTitle">검색</h2>
        <button class="search-overlay__close" type="button" aria-label="검색 닫기" data-search-close>×</button>
      </div>
      <form class="search-overlay__form" id="siteSearchForm">
        <label class="search-overlay__field" for="siteSearchInput">
          <span class="search-overlay__icon" aria-hidden="true">⌕</span>
          <input class="search-overlay__input" id="siteSearchInput" name="q" type="search" placeholder="검색어를 입력하세요" autocomplete="off" />
        </label>
        <button class="btn btn--brand search-overlay__submit" type="submit">검색</button>
      </form>
    </div>
  </div>

  <script src="/assets/js/search.js" defer></script>
</body>
</html>
