<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>글 목록 | Wacky Blog</title>
  <meta name="description" content="등록된 블로그 글 목록" />
  <link rel="stylesheet" href="/assets/css/app.css" />
  <link rel="stylesheet" href="/assets/css/components.css" />
</head>
<body>
  <header class="topbar">
    <div class="topbar__inner">
      <a class="brand" href="/"><span class="brand__mark">W</span><span>Wacky Blog</span></a>
      <nav class="nav" aria-label="주요 메뉴">
        <a href="/" data-path="/">홈</a>
        <a href="/about/" data-path="/about">소개</a>
        <a href="/admin/" data-admin-link hidden>관리자</a>
      </nav>
    </div>
  </header>

  <main class="container posts-page">
    <section class="card posts-hero" style="display:flex;flex-direction:column;gap:10px">
      <h1 id="postsPageTitle" class="h1">글 목록</h1>
      <p id="postsPageDescription" class="p">목록은 <b>/api/posts</b>에서 불러오며, 실제 공개 페이지는 각 <b>/post/slug</b> 주소에서 SSR로 열립니다.</p>
      <div class="row" style="flex-wrap:wrap">
        <a class="btn btn--brand" href="/add.html" data-admin-only hidden>새 글 작성</a>
                <a class="btn" href="/admin/dashboard.html" data-dashboard-link hidden>대시보드</a>
      </div>
    </section>

    <div class="posts-layout" style="margin-top:16px">
      <section class="posts-main" aria-label="글 목록 영역">
        <div id="postsCategoriesBar" class="posts-categories-bar" hidden></div>
        <div id="postsLoading" class="small">글 목록 불러오는 중…</div>
        <div id="postsError" class="small" hidden style="color:#b00020"></div>
        <div id="postsEmpty" class="small" hidden>등록된 글이 없습니다.</div>
        <div id="postsList" class="grid post-list-grid post-list-grid--rows" style="margin-top:12px"></div>

        <div id="postsLoadMoreWrap" class="posts-load-more" hidden>
          <button id="postsLoadMoreBtn" class="btn btn--brand posts-load-more__btn" type="button">더보기</button>
        </div>
      </section>

      <aside class="post-side posts-sidebar" aria-label="글 목록 사이드바">

        <section class="post-side__section" aria-labelledby="posts-ad-title">
          <h2 id="posts-ad-title" class="h2">광고 영역</h2>
          <div class="post-side__ad-slot post-side__ad-slot--placeholder" aria-label="향후 애드센스 광고 영역">
            <span>애드센스 광고가 들어갈 자리</span>
          </div>
        </section>

        <section class="post-side__section" aria-labelledby="posts-popular-title">
          <h2 id="posts-popular-title" class="h2">인기글</h2>
          <ul id="postsPopular" class="post-side__popular-list" style="margin-top:14px"></ul>
        </section>
      </aside>
    </div>
  </main>

  <footer class="footer container"><div class="footer__inner"><div>© 2026 Wacky Blog</div></div></footer>
  <script src="/assets/js/admin-ui.js" defer></script>
  <script src="/assets/js/nav.js" defer></script>
  <script src="/assets/js/posts.js" defer></script>
</body>
</html>
